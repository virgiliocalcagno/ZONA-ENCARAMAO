<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#136dec",
                        "background-dark": "#101822",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-background-dark text-slate-100 min-h-screen flex flex-col overflow-hidden">
    <!-- Header -->
    <header class="flex items-center justify-between px-8 py-4 border-b border-slate-800 bg-background-dark/50 backdrop-blur-md">
        <div class="flex items-center gap-3">
            <div class="text-primary"><span class="material-symbols-outlined text-4xl">directions_bus</span></div>
            <div>
                <h1 class="text-xl font-extrabold tracking-tight text-slate-100 uppercase leading-none">ZONA ENCARAMAO</h1>
                <p class="text-[10px] font-medium text-slate-400 uppercase tracking-widest mt-1">UNIDAD #402</p>
            </div>
        </div>

        <!-- Próxima Parada (Centro) -->
        <div id="next-stop-container" class="hidden flex-col items-center bg-[#f8c214] px-14 py-4 rounded-2xl border-4 border-yellow-200 shadow-xl shadow-yellow-500/30 animate-pulse min-w-[350px]">
            <span class="text-[12px] font-black text-slate-800 uppercase tracking-[0.4em] mb-1">Próxima Parada</span>
            <span id="next-stop-name" class="text-3xl font-black text-slate-900 uppercase tracking-tight italic">---</span>
        </div>

        <div class="flex items-center gap-6">
            <div class="text-right">
                <p class="text-2xl font-bold text-slate-100" id="time">14:45</p>
                <div class="flex items-center gap-2 justify-end">
                    <div class="size-2 rounded-full bg-green-500"></div>
                    <span class="text-[10px] font-bold text-slate-400 uppercase">GPS Activo</span>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 flex flex-col landscape:flex-row gap-6 p-6 overflow-hidden">
        <div class="flex-[1.5] flex flex-col gap-6 relative">
            <div id="driver-map" class="flex-1 rounded-xl border-4 border-slate-800 bg-slate-900 overflow-hidden shadow-inner relative z-10 w-full"></div>
        </div>

        <!-- Columna Derecha: Pasajeros y Alertas -->
        <div class="flex-1 flex flex-col gap-6 relative">
            <!-- Tarjetas de Alerta (Ahora en la columna derecha para no tapar el mapa) -->
            <div id="alert-card" class="absolute inset-0 z-40 flex flex-col justify-center items-center bg-background-dark/95 backdrop-blur border-4 border-primary rounded-xl p-6 text-center shadow-2xl transition-all duration-500 opacity-0 translate-y-10 pointer-events-none">
                <div class="animate-ping absolute top-0 right-0 -mt-2 -mr-2 size-6 rounded-full bg-red-500 hidden" id="alert-ping"></div>
                <div class="mb-4">
                    <span class="material-symbols-outlined text-primary text-8xl" id="alert-icon" style="font-variation-settings: 'FILL' 1, 'wght' 700, 'GRAD' 0, 'opsz' 48;">hail</span>
                </div>
                <h2 class="text-primary text-2xl font-black uppercase tracking-widest mb-2" id="alert-title">Siguiente Parada</h2>
                <p class="text-slate-300 text-base font-bold mb-6" id="alert-desc">Escaneando ruta...</p>
                <div class="flex gap-4 w-full hidden" id="alert-actions">
                    <button onclick="dismissAlert()" class="flex-1 bg-slate-800 hover:bg-slate-700 text-white font-bold py-4 rounded-xl text-sm uppercase transition-all active:scale-95">Ignorar</button>
                    <button onclick="acceptAlert()" class="flex-1 bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl text-sm uppercase transition-all shadow-lg shadow-primary/20 active:scale-95">Confirmar</button>
                </div>
            </div>

            <div id="request-alert-card" class="absolute inset-0 z-50 flex flex-col justify-center items-center bg-background-dark/95 backdrop-blur border-4 border-[#f8c214] rounded-xl p-6 text-center shadow-2xl transition-all duration-500 opacity-0 -translate-y-10 pointer-events-none">
                <div class="animate-ping absolute top-0 right-0 -mt-2 -mr-2 size-6 rounded-full bg-[#f8c214]" id="request-alert-ping"></div>
                <div class="mb-4">
                    <span id="request-alert-icon" class="material-symbols-outlined text-[#f8c214] text-8xl" style="font-variation-settings: 'FILL' 1, 'wght' 700, 'GRAD' 0, 'opsz' 48;">person_raised_hand</span>
                </div>
                <h2 class="text-[#f8c214] text-2xl font-black uppercase tracking-widest mb-2">¡Nuevo Pasajero!</h2>
                <p class="text-slate-300 text-base font-bold mb-6">Solicitud de recogida activa</p>
                <div class="flex gap-4 w-full">
                    <button onclick="dismissRequest()" class="flex-1 bg-slate-800 hover:bg-slate-700 text-white font-bold py-4 rounded-xl text-sm uppercase transition-all active:scale-95">Ignorar</button>
                    <button onclick="acceptRequest()" class="flex-1 bg-[#f8c214] hover:bg-[#f8c214]/90 text-slate-900 font-black py-4 rounded-xl text-sm uppercase transition-all shadow-lg shadow-yellow-500/20 active:scale-95">Aceptar Servicio</button>
                </div>
            </div>
            <div class="flex-1 bg-slate-900 border border-slate-800 rounded-xl p-8 flex flex-col items-center justify-between shadow-xl">
                <h2 class="text-slate-400 font-bold uppercase text-center text-sm tracking-[0.2em]">Pasajeros a Bordo</h2>
                <div class="flex flex-col items-center">
                    <span id="pax-count" class="text-[6rem] landscape:text-[8rem] font-black leading-none text-white tabular-nums">12</span>
                    <p class="text-slate-500 font-bold text-lg uppercase tracking-widest">Capacidad: 35</p>
                </div>
                <div class="w-full flex gap-6">
                    <button onclick="updatePax(-1)" class="flex-1 aspect-square max-h-[120px] flex flex-col items-center justify-center bg-slate-800 hover:bg-slate-700 text-slate-100 rounded-2xl border-b-4 border-slate-950 transition-all active:scale-95">
                        <span class="material-symbols-outlined text-5xl">remove</span>
                    </button>
                    <button onclick="updatePax(1)" class="flex-1 aspect-square max-h-[120px] flex flex-col items-center justify-center bg-primary hover:bg-primary/90 text-white rounded-2xl border-b-4 border-blue-900 transition-all active:scale-95">
                        <span class="material-symbols-outlined text-5xl">add</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-slate-950 px-8 py-3 border-t border-slate-800 flex justify-between items-center">
        <div class="flex items-center gap-8">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-sm text-slate-400">battery_charging_full</span>
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">98%</span>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="simulateArrival()" class="bg-primary/20 text-primary border border-primary/30 px-6 py-2 rounded-lg text-sm font-black uppercase tracking-widest hover:bg-primary hover:text-white transition-all">Simular Parada (Llegada)</button>
            <button onclick="simulateAlert()" class="bg-slate-800 text-slate-300 px-6 py-2 rounded-lg text-sm font-bold uppercase tracking-widest hover:bg-slate-700">Simular Alerta</button>
        </div>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    <script type="module" src="/src/main.js"></script>
</body>
</html>

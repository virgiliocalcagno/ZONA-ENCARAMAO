name: Deploy to Firebase Hosting on PR
on: pull_request
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies and build Admin
        run: cd web-dashboard && npm ci && npm run build
      - name: Install dependencies and build Client
        run: cd web-client && npm ci && npm run build
      - name: Install dependencies and build Driver
        run: cd web-driver && npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ZONA_ENCARAMAO }}
          projectId: zona-encaramao
